<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked by ReDD Blocker</title>
    <style>
      :root {
        /* Tracks the ReDD design language used in redd-block/src/styles.css
         * and reddfocus-open-source/.../popup.css:
         *   canvas  = #faf8f5  (warm cream)
         *   card    = #ffffff
         *   border  = #e1dcd6  (warm cream divider)
         *   navy    = #1e2d3e  (primary text & headings)
         *   body    = #2c2c35  (secondary text)
         *   muted   = #696977
         *   teal    = #2a9d8f  (accent)
         *   coral   = #d4605a  (heart)
         * Headings use Georgia serif; body uses Inter (with system fallback)
         * — same pairing as the redd-block app and the extension popup, so
         * the block page feels like a continuation of the brand surface
         * rather than a random error page.
         */
        --bg: #faf8f5;
        --card-bg: #ffffff;
        --card-border: #e1dcd6;
        --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                       0 8px 24px rgba(30, 45, 62, 0.08);
        --text-primary: #1e2d3e;
        --text-secondary: #2c2c35;
        --text-muted: #696977;
        --divider: #e1dcd6;
        --pill-fallback: #2a9d8f;
        --footer-text: #696977;
        --footer-link: #2c2c35;
        --heart: #d4605a;

        --font-heading: Georgia, "Times New Roman", serif;
        --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, Arial, Helvetica, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        /* Inverted-cream dark mode (matches redd-block dark mode). */
        :root {
          --bg: #14202c;
          --card-bg: #1e2d3e;
          --card-border: rgba(255, 255, 255, 0.10);
          --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.2),
                         0 8px 24px rgba(0, 0, 0, 0.35);
          --text-primary: #f5f0e8;
          --text-secondary: #e6e2d8;
          --text-muted: #9aa3b0;
          --divider: rgba(255, 255, 255, 0.10);
          --pill-fallback: #4ec0b0;
          --footer-text: #9aa3b0;
          --footer-link: #e6e2d8;
          --heart: #e07b75;
        }
      }

      * { box-sizing: border-box; }

      /* Force the HTML `hidden` attribute to actually hide. Our detail
         rows use `display: flex`, which would otherwise silently override
         `hidden` and leave empty-valued rows visible. */
      [hidden] { display: none !important; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      body {
        background: var(--bg);
        font-family: var(--font-body);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 20px 80px;
      }

      main {
        width: 100%;
        max-width: 520px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        box-shadow: var(--card-shadow);
        padding: 36px 32px 32px;
        text-align: center;
      }

      .app-icon {
        height: 80px;
        width: 80px;
        margin: 0 auto 16px;
        display: block;
        object-fit: contain;
      }

      h1 {
        font-family: var(--font-heading);
        font-size: 26px;
        font-weight: 500;
        margin: 0 0 6px;
        letter-spacing: 0;
        line-height: 1.2;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 15px;
        margin: 0 0 24px;
      }

      .blocklist-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--pill-bg, var(--pill-fallback));
        color: var(--pill-text, #fff);
        font-size: 15px;
        font-weight: 600;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 18px;
      }

      .blocklist-pill .emoji { font-size: 18px; }
      .blocklist-pill .name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .details {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 18px 0 4px;
        padding-top: 18px;
        border-top: 1px solid var(--divider);
        text-align: left;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        font-size: 14px;
      }

      .detail-row .label {
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .detail-row .value {
        color: var(--text-primary);
        font-weight: 500;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .detail-row .value.mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      #countdown {
        font-variant-numeric: tabular-nums;
      }

      footer {
        margin-top: 28px;
        color: var(--footer-text);
        font-size: 13px;
        text-align: center;
      }
      footer a {
        color: var(--footer-link);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      footer a:hover { color: var(--text-primary); }
      .heart { color: var(--heart); }

      /* Small-screen polish */
      @media (max-width: 480px) {
        main { padding: 28px 20px 22px; }
        h1 { font-size: 22px; }
        .detail-row { font-size: 13px; }
      }

      body.popup-mode {
        min-height: auto;
        display: block;
        padding: 14px;
        overflow: hidden;
      }

      body.popup-mode main {
        max-width: none;
        border-radius: 16px;
        box-shadow: none;
        padding: 22px 20px 18px;
      }

      body.popup-mode .app-icon {
        height: 56px;
        width: 56px;
        margin-bottom: 10px;
      }

      body.popup-mode h1 {
        font-size: 18px;
        line-height: 1.15;
        margin-bottom: 5px;
      }

      body.popup-mode .subtitle {
        font-size: 13px;
        margin-bottom: 16px;
      }

      body.popup-mode .blocklist-pill {
        padding: 7px 12px;
        font-size: 13px;
        margin-bottom: 12px;
      }

      body.popup-mode .details {
        gap: 7px;
        margin-top: 12px;
        padding-top: 12px;
      }

      body.popup-mode .detail-row {
        font-size: 12px;
      }

      body.popup-mode .detail-row .value {
        white-space: normal;
      }

      body.popup-mode .detail-row .value.mono {
        font-size: 12px;
      }

      body.popup-mode footer {
        margin-top: 12px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="app-icon" src="images/logo-reddblocker.svg" alt="" aria-hidden="true">

      <h1>Blocked by ReDD Blocker</h1>
      <p class="subtitle" id="subtitle">This site is on your current blocklist.</p>

      <div id="pill-wrap" hidden>
        <span class="blocklist-pill" id="pill">
          <span class="emoji" id="pill-emoji"></span>
          <span class="name" id="pill-name"></span>
        </span>
      </div>

      <div class="details">
        <div class="detail-row" id="row-url">
          <span class="label">Site</span>
          <span class="value mono" id="url-value"></span>
        </div>
        <div class="detail-row" id="row-source" hidden>
          <span class="label">Reason</span>
          <span class="value" id="source-value"></span>
        </div>
        <div class="detail-row" id="row-ends" hidden>
          <span class="label" id="ends-label">Ends in</span>
          <span class="value"><span id="countdown"></span><span id="ends-at-suffix"></span></span>
        </div>
        <div class="detail-row" id="row-started" hidden>
          <span class="label">Started</span>
          <span class="value" id="started-value"></span>
        </div>
      </div>
    </main>

    <footer>
      Made with <span class="heart" aria-label="love">♥</span> by
      <a href="https://digitalhabits.org" target="_blank" rel="noopener noreferrer">digitalhabits.org</a>
    </footer>

    <!--
      Logic lives in blocked.js so it satisfies MV3's default
      `script-src 'self'` CSP. Inline <script> blocks in extension pages
      are blocked outright, which would leave the pill/countdown/source
      rows silently empty.
    -->
    <script src="blocked.js"></script>
  </body>
</html>
