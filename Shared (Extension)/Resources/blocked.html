<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked by ReDD Block</title>
    <style>
      :root {
        /* Tracks the ReDD design language used in redd-block/src/styles.css
         * and reddfocus-open-source/.../popup.css:
         *   canvas  = #faf8f5  (warm cream)
         *   card    = #ffffff
         *   border  = #e1dcd6  (warm cream divider)
         *   navy    = #1e2d3e  (primary text & headings)
         *   body    = #2c2c35  (secondary text)
         *   muted   = #696977
         *   teal    = #2a9d8f  (accent)
         *   coral   = #d4605a  (heart)
         * Headings use Georgia serif; body uses Inter (with system fallback)
         * — same pairing as the redd-block app and the extension popup, so
         * the block page feels like a continuation of the brand surface
         * rather than a random error page.
         */
        --bg: #faf8f5;
        --card-bg: #ffffff;
        --card-border: #e1dcd6;
        --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                       0 8px 24px rgba(30, 45, 62, 0.08);
        --text-primary: #1e2d3e;
        --text-secondary: #2c2c35;
        --text-muted: #696977;
        --divider: #e1dcd6;
        --pill-fallback: #2a9d8f;
        --footer-text: #696977;
        --footer-link: #2c2c35;
        --heart: #d4605a;

        --font-heading: Georgia, "Times New Roman", serif;
        --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, Arial, Helvetica, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        /* Inverted-cream dark mode (matches redd-block dark mode). */
        :root {
          --bg: #14202c;
          --card-bg: #1e2d3e;
          --card-border: rgba(255, 255, 255, 0.10);
          --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.2),
                         0 8px 24px rgba(0, 0, 0, 0.35);
          --text-primary: #f5f0e8;
          --text-secondary: #e6e2d8;
          --text-muted: #9aa3b0;
          --divider: rgba(255, 255, 255, 0.10);
          --pill-fallback: #4ec0b0;
          --footer-text: #9aa3b0;
          --footer-link: #e6e2d8;
          --heart: #e07b75;
        }
      }

      * { box-sizing: border-box; }

      /* Force the HTML `hidden` attribute to actually hide. Our detail
         rows use `display: flex`, which would otherwise silently override
         `hidden` and leave empty-valued rows visible. */
      [hidden] { display: none !important; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      body {
        background: var(--bg);
        font-family: var(--font-body);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 20px 80px;
      }

      main {
        width: 100%;
        max-width: 520px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        box-shadow: var(--card-shadow);
        padding: 36px 32px 32px;
        text-align: center;
      }

      .app-icon {
        /* shield-only.svg is a portrait shape (~633x791). Width scales
           automatically from height so the aspect ratio stays right. */
        height: 80px;
        width: auto;
        margin: 0 auto 16px;
        display: block;
      }

      h1 {
        font-family: var(--font-heading);
        font-size: 26px;
        font-weight: 500;
        margin: 0 0 6px;
        letter-spacing: 0;
        line-height: 1.2;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 15px;
        margin: 0 0 24px;
      }

      .blocklist-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--pill-bg, var(--pill-fallback));
        color: var(--pill-text, #fff);
        font-size: 15px;
        font-weight: 600;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 18px;
      }

      .blocklist-pill .emoji { font-size: 18px; }
      .blocklist-pill .name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .details {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 18px 0 4px;
        padding-top: 18px;
        border-top: 1px solid var(--divider);
        text-align: left;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        font-size: 14px;
      }

      .detail-row .label {
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .detail-row .value {
        color: var(--text-primary);
        font-weight: 500;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .detail-row .value.mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      #countdown {
        font-variant-numeric: tabular-nums;
      }

      footer {
        margin-top: 28px;
        color: var(--footer-text);
        font-size: 13px;
        text-align: center;
      }
      footer a {
        color: var(--footer-link);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      footer a:hover { color: var(--text-primary); }
      .heart { color: var(--heart); }

      /* Small-screen polish */
      @media (max-width: 480px) {
        main { padding: 28px 20px 22px; }
        h1 { font-size: 22px; }
        .detail-row { font-size: 13px; }
      }

      body.popup-mode {
        min-height: auto;
        display: block;
        padding: 14px;
        overflow: hidden;
      }

      body.popup-mode main {
        max-width: none;
        border-radius: 16px;
        box-shadow: none;
        padding: 22px 20px 18px;
      }

      body.popup-mode .app-icon {
        height: 56px;
        margin-bottom: 10px;
      }

      body.popup-mode h1 {
        font-size: 18px;
        line-height: 1.15;
        margin-bottom: 5px;
      }

      body.popup-mode .subtitle {
        font-size: 13px;
        margin-bottom: 16px;
      }

      body.popup-mode .blocklist-pill {
        padding: 7px 12px;
        font-size: 13px;
        margin-bottom: 12px;
      }

      body.popup-mode .details {
        gap: 7px;
        margin-top: 12px;
        padding-top: 12px;
      }

      body.popup-mode .detail-row {
        font-size: 12px;
      }

      body.popup-mode .detail-row .value {
        white-space: normal;
      }

      body.popup-mode .detail-row .value.mono {
        font-size: 12px;
      }

      body.popup-mode footer {
        margin-top: 12px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <!--
        Inline SVG of the ReDD Block shield. Kept in sync with
        redd-block/assets/icons/shield-only.svg; duplicated here so
        blocked.html is self-contained and doesn't need an extra bundled
        asset. The shield-only variant (no red rounded-square behind it)
        works better on a card because the card already provides the
        visual container.
      -->
      <svg class="app-icon" viewBox="0 0 633 791" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="50"  y="381" width="533" height="220" fill="#9DC6A1"/>
        <rect x="85"  y="536" width="355" height="111" fill="#9DC6A1"/>
        <rect x="140" y="601" width="325" height="98"  fill="#9DC6A1"/>
        <rect x="127" y="583" width="325" height="98"  fill="#9DC6A1"/>
        <rect x="220" y="545" width="326" height="111" fill="#9DC6A1"/>
        <rect x="308" y="570" width="181" height="111" fill="#9DC6A1"/>
        <rect x="212" y="626" width="214" height="123" fill="#9DC6A1"/>
        <rect x="115" y="115" width="403" height="149" fill="#AAD5F7"/>
        <rect x="220" y="71"  width="194" height="88"  fill="#AAD5F7"/>
        <rect x="251" y="47"  width="132" height="47"  fill="#AAD5F7"/>
        <rect x="-17" y="151" width="647" height="245" fill="#AAD5F7"/>
        <path d="M316.5 25C321.558 25 326.448 26.7991 330.297 30.0713C402.288 92.9147 506.317 143.647 593.438 143.647C597.304 143.647 601.009 145.183 603.739 147.912C606.469 150.64 608 154.338 608 158.191V434.995C608 527.247 575.991 595.151 525.294 647.14C473.95 699.792 402.324 737.203 321.886 765.243C318.724 766.303 315.293 766.248 312.167 765.084L311.602 764.881L307.826 763.568C228.683 735.863 158.348 698.881 107.739 647.074C57.009 595.143 25.0001 527.248 25 434.995V158.191C25 154.338 26.5312 150.64 29.2607 147.912C31.9054 145.269 35.4655 143.745 39.2002 143.652L39.5625 143.647C126.703 143.647 231.127 92.5018 302.699 30.0742C306.549 26.8 311.441 25 316.5 25Z" stroke="#0A2D7B" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>

      <h1>Blocked by ReDD Block</h1>
      <p class="subtitle">This site is on your current blocklist.</p>

      <div id="pill-wrap" hidden>
        <span class="blocklist-pill" id="pill">
          <span class="emoji" id="pill-emoji"></span>
          <span class="name" id="pill-name"></span>
        </span>
      </div>

      <div class="details">
        <div class="detail-row" id="row-url">
          <span class="label">Site</span>
          <span class="value mono" id="url-value"></span>
        </div>
        <div class="detail-row" id="row-source" hidden>
          <span class="label">Reason</span>
          <span class="value" id="source-value"></span>
        </div>
        <div class="detail-row" id="row-ends" hidden>
          <span class="label" id="ends-label">Ends in</span>
          <span class="value"><span id="countdown"></span><span id="ends-at-suffix"></span></span>
        </div>
        <div class="detail-row" id="row-started" hidden>
          <span class="label">Started</span>
          <span class="value" id="started-value"></span>
        </div>
      </div>
    </main>

    <footer>
      Made with <span class="heart" aria-label="love">♥</span> by
      <a href="https://reddfocus.org" target="_blank" rel="noopener noreferrer">reddfocus.org</a>
    </footer>

    <!--
      Logic lives in blocked.js so it satisfies MV3's default
      `script-src 'self'` CSP. Inline <script> blocks in extension pages
      are blocked outright, which would leave the pill/countdown/source
      rows silently empty.
    -->
    <script src="blocked.js"></script>
  </body>
</html>
